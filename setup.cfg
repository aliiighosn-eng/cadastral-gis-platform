[flake8]
# PEP8 and flake8 configuration for Gazprom Proekt
max-line-length = 79
max-complexity = 15
max-local-variables = 8
max-arguments = 6
max-methods = 8
max-module-members = 15
max-try-body-length = 5

# Ignore specific violations
ignore =
    E203,
    W503,
    W504,
    WPS110,
    WPS111,
    WPS115,
    WPS201,
    WPS202,
    WPS204,
    WPS210,
    WPS211,
    WPS214,
    WPS217,
    WPS220,
    WPS221,
    WPS223,
    WPS226,
    WPS229,
    WPS230,
    WPS231,
    WPS232,
    WPS235,
    WPS237,
    WPS327,
    WPS335,
    WPS358,
    WPS404,
    WPS420,
    WPS421,
    WPS432,
    WPS459,
    WPS476,
    WPS501,
    WPS504,
    WPS505,
    WPS515,
    WPS529,
    WPS602

exclude =
    .git,
    __pycache__,
    .venv,
    venv,
    build,
    dist,
    .eggs,
    *.egg-info,
    .pytest_cache,
    .mypy_cache
