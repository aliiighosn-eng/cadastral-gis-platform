name: Code Quality

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  lint:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install ruff black isort flake8 wemake-python-styleguide

      - name: Run Ruff
        run: ruff check server/

      - name: Run Black
        run: black --check server/

      - name: Run Flake8
        run: flake8 server/
